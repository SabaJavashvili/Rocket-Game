<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Rocket Through the Galaxy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@500;700;800&display=swap" rel="stylesheet">

<style>
  /* ----------------------------------------------------------------
     Design tokens — tweak here to retune the whole scene.
     Chroma is kept low so whites don't read as pastel and the
     overall palette feels like deep space.
  -----------------------------------------------------------------*/
  :root {
    /* Background gradient (deep space) */
    --bg-top:        #05060f;   /* almost black, cool */
    --bg-mid:        #0f0a2a;   /* midnight indigo */
    --bg-bot:        #1a0b36;   /* deep violet */

    /* Accents */
    --star:          #e9ecff;
    --nebula-a:      rgba( 96,  60, 200, 0.35);
    --nebula-b:      rgba(200,  60, 150, 0.22);
    --nebula-c:      rgba( 40, 120, 220, 0.28);

    /* Rocket body */
    --hull:          #eef1f7;
    --hull-shade:    #b7bccb;
    --hull-dark:     #6e7489;
    --window:        #4fd1ff;
    --window-glow:   #a9ecff;
    --fin:           #1a2240;

    /* Exhaust */
    --flame-core:    #fff7d6;
    --flame-hot:     #ffb347;
    --flame-mid:     #ff5a6e;
    --flame-cold:    #7a4bff;

    /* Planet palette (simple, original — not recreating any known planets) */
    --planet-a1:     #6b8bff;
    --planet-a2:     #2a2f7a;
    --planet-b1:     #ff8a5c;
    --planet-b2:     #7a2a38;
    --planet-c1:     #7be0c1;
    --planet-c2:     #174b52;

    /* Motion speeds (seconds) */
    --wobble:        2.6s;
    --flicker:       0.18s;
    --pulse:         1.1s;
    --star-near:     4.0s;
    --star-mid:      8.0s;
    --star-far:     16.0s;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; overscroll-behavior: none; }
  body {
    font-family: ui-sans-serif, system-ui, -apple-system, "Helvetica Neue", Helvetica, Arial, sans-serif;
    background: #000;
    color: var(--star);
    overflow: hidden;
    /* Prevent scroll/zoom/gesture eating our touch input */
    touch-action: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
  }

  /* Stage fills the viewport and clips all motion layers */
  .stage {
    position: fixed;
    inset: 0;
    overflow: hidden;
    /* Deep space vertical gradient with a soft purple "core" glow */
    background:
      radial-gradient(ellipse 80% 55% at 50% 60%,
        rgba(120, 70, 220, 0.18) 0%,
        rgba(120, 70, 220, 0.00) 60%),
      linear-gradient(180deg,
        var(--bg-top) 0%,
        var(--bg-mid) 55%,
        var(--bg-bot) 100%);
    isolation: isolate;
  }

  /* ----------------------------------------------------------------
     Nebulae — soft blurred blobs drifting slowly for depth.
  -----------------------------------------------------------------*/
  .nebula {
    position: absolute;
    width: 60vmax; height: 60vmax;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.9;
    mix-blend-mode: screen;
    pointer-events: none;
  }
  .nebula.a {
    left: -15vmax; top: 10vh;
    background: radial-gradient(circle at 40% 40%, var(--nebula-a), transparent 60%);
    animation: drift-a 40s ease-in-out infinite alternate;
  }
  .nebula.b {
    right: -20vmax; top: 40vh;
    background: radial-gradient(circle at 50% 50%, var(--nebula-b), transparent 60%);
    animation: drift-b 55s ease-in-out infinite alternate;
  }
  .nebula.c {
    left: 30%; top: -20vmax;
    background: radial-gradient(circle at 50% 50%, var(--nebula-c), transparent 60%);
    animation: drift-c 70s ease-in-out infinite alternate;
  }
  @keyframes drift-a { to { transform: translate(8vw,  6vh) scale(1.1); } }
  @keyframes drift-b { to { transform: translate(-6vw, -4vh) scale(0.95); } }
  @keyframes drift-c { to { transform: translate(4vw,  10vh) scale(1.05); } }

  /* ----------------------------------------------------------------
     Starfield layers — three <canvas> elements stacked & scrolling
     at different speeds for parallax. Canvas lets us draw hundreds
     of stars cheaply; CSS keyframes do the actual motion.
  -----------------------------------------------------------------*/
  .stars {
    position: absolute;
    left: 0; right: 0;
    /* Each layer is drawn twice-tall and looped via translateY. */
    top: -100%;
    width: 100%;
    height: 200%;
    will-change: transform;
    pointer-events: none;
  }
  .stars.far  { animation: scroll-stars var(--star-far)  linear infinite; opacity: 0.55; }
  .stars.mid  { animation: scroll-stars var(--star-mid)  linear infinite; opacity: 0.80; }
  .stars.near { animation: scroll-stars var(--star-near) linear infinite; opacity: 1.00; }

  @keyframes scroll-stars {
    from { transform: translateY(0); }
    to   { transform: translateY(50%); } /* canvas is 2× tall → 50% = one screen */
  }

  /* Subtle twinkle overlay (CSS-only, doesn't need per-star JS) */
  .twinkle {
    position: absolute; inset: 0;
    background-image:
      radial-gradient(1.2px 1.2px at 12% 22%, #fff, transparent 60%),
      radial-gradient(1.4px 1.4px at 78% 64%, #fff, transparent 60%),
      radial-gradient(1.0px 1.0px at 44% 82%, #fff, transparent 60%),
      radial-gradient(1.6px 1.6px at 88% 14%, #fff, transparent 60%),
      radial-gradient(1.2px 1.2px at 30% 56%, #fff, transparent 60%);
    animation: twinkle 3.2s ease-in-out infinite alternate;
    pointer-events: none;
    opacity: 0.7;
  }
  @keyframes twinkle {
    from { opacity: 0.2; }
    to   { opacity: 0.9; }
  }

  /* ----------------------------------------------------------------
     Passing planets — slow diagonal drift across the screen.
     Shapes are SVG <circle>s with radial gradients; nothing complex.
  -----------------------------------------------------------------*/
  .planet {
    position: absolute;
    width: 240px; height: 240px;
    will-change: transform;
    pointer-events: none;
    filter: drop-shadow(0 0 30px rgba(120,120,255,0.25));
  }
  .planet.one {
    top: 18%;
    animation: pass-planet-1 28s linear infinite;
  }
  .planet.two {
    top: 62%;
    width: 160px; height: 160px;
    animation: pass-planet-2 38s linear infinite;
    animation-delay: -14s;
  }
  .planet.three {
    top: 8%;
    width: 110px; height: 110px;
    animation: pass-planet-3 22s linear infinite;
    animation-delay: -8s;
  }
  /* Keep planets fully off-screen at the endpoints so the loop is seamless */
  @keyframes pass-planet-1 {
    from { transform: translate(110vw, -4vh); }
    to   { transform: translate(-40vw, 14vh); }
  }
  @keyframes pass-planet-2 {
    from { transform: translate(115vw, 6vh); }
    to   { transform: translate(-35vw, -10vh); }
  }
  @keyframes pass-planet-3 {
    from { transform: translate(110vw, 0); }
    to   { transform: translate(-30vw, 6vh); }
  }

  /* ----------------------------------------------------------------
     Asteroids — tiny rocks streaking by (pure CSS)
  -----------------------------------------------------------------*/
  .asteroid {
    position: absolute;
    width: 10px; height: 7px;
    background: #9aa0b4;
    border-radius: 60% 40% 55% 45% / 50% 60% 40% 50%;
    box-shadow:
      inset -2px -1px 0 rgba(0,0,0,0.35),
      0 0 6px rgba(255,180,120,0.25);
    will-change: transform;
    opacity: 0.9;
  }
  .asteroid.a { top: 30%; animation: fly-rock 9s linear infinite; }
  .asteroid.b { top: 70%; width: 6px; height: 5px;
                animation: fly-rock 13s linear infinite; animation-delay: -5s; }
  .asteroid.c { top: 48%; width: 14px; height: 9px;
                animation: fly-rock 18s linear infinite; animation-delay: -11s; opacity: 0.7; }
  @keyframes fly-rock {
    from { transform: translate(110vw, 0)  rotate(0deg); }
    to   { transform: translate(-20vw, 8vh) rotate(540deg); }
  }

  /* ----------------------------------------------------------------
     The rocket — SVG, centered, with layered wobble/vibration.
     Two nested wrappers so wobble (slow sway) and vibe (fast jitter)
     don't fight each other.
  -----------------------------------------------------------------*/
  .rocket-wrap {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: min(110px, 9vw);
    aspect-ratio: 1 / 2.2;
    will-change: transform;
  }
  /* Outer pilot layer — driven by JS based on keyboard input.
     Lives above .wobble/.vibe so flight motion and idle jitter compose. */
  .pilot {
    width: 100%; height: 100%;
    will-change: transform;
  }
  .wobble {
    width: 100%; height: 100%;
    animation: wobble var(--wobble) ease-in-out infinite alternate;
    transform-origin: 50% 60%;
  }
  .vibe {
    width: 100%; height: 100%;
    animation: vibe 0.09s steps(2) infinite;
  }
  @keyframes wobble {
    0%   { transform: translateY(-4px) rotate(-1.6deg); }
    50%  { transform: translateY( 3px) rotate( 0.4deg); }
    100% { transform: translateY(-2px) rotate( 1.6deg); }
  }
  @keyframes vibe {
    0%   { transform: translate(-0.4px, 0); }
    50%  { transform: translate( 0.4px, 0.3px); }
    100% { transform: translate( 0,    -0.3px); }
  }

  .rocket-svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 12px 24px rgba(0,0,0,0.55))
            drop-shadow(0 0 18px rgba(120, 160, 255, 0.15));
    overflow: visible;
  }

  /* Window interior glow — gentle pulse */
  .window-glow {
    transform-origin: center;
    animation: win-pulse 3.4s ease-in-out infinite alternate;
  }
  @keyframes win-pulse {
    from { opacity: 0.75; }
    to   { opacity: 1.0; }
  }

  /* ----------------------------------------------------------------
     Exhaust flames — stacked shapes with flicker/pulse.
     Three layers: cold outer, hot middle, white-hot core.
  -----------------------------------------------------------------*/
  .flame {
    transform-origin: 50% 0%;
    mix-blend-mode: screen;
  }
  .flame.outer  { animation: flame-outer var(--pulse) ease-in-out infinite; }
  .flame.middle { animation: flame-mid   calc(var(--pulse) * 0.7) ease-in-out infinite; }
  .flame.core   { animation: flame-core  var(--flicker) steps(2) infinite; }

  @keyframes flame-outer {
    0%,100% { transform: scaleY(1.00) scaleX(1.00); opacity: 0.75; }
    50%     { transform: scaleY(1.18) scaleX(0.92); opacity: 0.95; }
  }
  @keyframes flame-mid {
    0%,100% { transform: scaleY(0.95) scaleX(1.05); opacity: 0.85; }
    50%     { transform: scaleY(1.20) scaleX(0.90); opacity: 1.00; }
  }
  @keyframes flame-core {
    0%   { transform: scaleY(1.00) scaleX(1.00); opacity: 1.0; }
    100% { transform: scaleY(1.12) scaleX(0.94); opacity: 0.85; }
  }

  /* Embers streaming behind the rocket */
  .embers {
    position: absolute;
    left: 50%;
    top: calc(50% + min(55px, 4.5vw));
    transform: translateX(-50%);
    width: min(60px, 5vw);
    height: 30vh;
    pointer-events: none;
    overflow: visible;
  }
  .ember {
    position: absolute;
    left: 50%;
    top: 0;
    width: 3px; height: 3px;
    border-radius: 50%;
    background: var(--flame-hot);
    box-shadow: 0 0 8px var(--flame-hot), 0 0 16px var(--flame-mid);
    animation: ember-fall 1.6s linear infinite;
    opacity: 0;
  }
  @keyframes ember-fall {
    0%   { transform: translate(-50%, 0)    scale(1);   opacity: 0; }
    10%  { opacity: 1; }
    100% { transform: translate(calc(-50% + var(--drift, 0px)), 40vh) scale(0.2); opacity: 0; }
  }

  /* ----------------------------------------------------------------
     Lasers — neon bolts streaming upward from the rocket nose.
  -----------------------------------------------------------------*/
  .lasers {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 4;
  }
  .laser {
    position: absolute;
    width: 4px;
    height: 22px;
    border-radius: 2px;
    background: linear-gradient(
      to bottom,
      rgba(255,255,255,0) 0%,
      #a9ecff 20%,
      #4fd1ff 50%,
      #7a4bff 100%
    );
    box-shadow:
      0 0 6px #4fd1ff,
      0 0 14px #4fd1ff,
      0 0 24px rgba(122, 75, 255, 0.8);
    transform: translate(-50%, -50%);
    will-change: transform, opacity;
  }
  .laser::after {
    /* Soft halo head */
    content: "";
    position: absolute;
    left: 50%; top: -2px;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.9), rgba(79,209,255,0.5) 40%, transparent 70%);
    transform: translate(-50%, -50%);
  }

  /* ----------------------------------------------------------------
     UFOs, particles, score, game-over
  -----------------------------------------------------------------*/
  .ufos, .fx {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 3;
  }
  .ufo {
    position: absolute;
    will-change: transform, left, top;
    filter: drop-shadow(0 6px 14px rgba(0,0,0,0.55))
            drop-shadow(0 0 14px rgba(120, 220, 255, 0.25));
    transition: filter 0.08s;
  }
  .ufo svg { width: 100%; height: 100%; display: block; }
  .ufo.flash { filter: drop-shadow(0 0 12px #fff) brightness(2.2); }

  .particle {
    position: absolute;
    width: 5px; height: 5px;
    border-radius: 50%;
    pointer-events: none;
    will-change: transform, opacity;
    mix-blend-mode: screen;
  }
  .particle.warm {
    background: #fff7d6;
    box-shadow: 0 0 8px #ffb347, 0 0 16px #ff5a6e;
  }
  .particle.cool {
    background: #a9ecff;
    box-shadow: 0 0 8px #4fd1ff, 0 0 16px #7a4bff;
  }

  .score {
    position: absolute;
    top: 18px; right: 22px;
    z-index: 6;
    padding: 14px 14px 10px;
    border-radius: 10px;
    background: rgba(10,8,30,0.55);
    border: 1px solid rgba(180,180,255,0.18);
    color: #e9ecff;
    font: 600 14px/1 "Noto Sans Georgian","Sylfaen",ui-monospace,SFMono-Regular,Menlo,monospace;
    letter-spacing: 0.08em;
    user-select: none;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: flex; align-items: center; gap: 10px;
    line-height: 1;
  }
  .score > * { display: flex; align-items: center; }
  .score .score-label { font-size: 12px; opacity: 0.85; }
  .score #score { font-size: 18px; font-weight: 800; line-height: 1; }
  .score .coin { width: 20px; height: 20px; }
  .score .coin svg { width: 100%; height: 100%; display: block; }
  .score .coin {
    width: 22px; height: 22px;
    display: inline-block;
    filter: drop-shadow(0 0 6px rgba(255,196,61,0.55));
    animation: coin-spin 2.4s ease-in-out infinite;
    transform-origin: center;
  }
  .score .coin svg { width: 100%; height: 100%; display: block; }
  @keyframes coin-spin {
    0%,100% { transform: rotateY(0deg); }
    50%     { transform: rotateY(180deg); }
  }
  .score-label { opacity: 0.6; font-size: 11px; align-self: baseline; }
  .score #score {
    font-size: 20px;
    font-weight: 800;
    color: #ffd76a;
    text-shadow: 0 0 10px rgba(255,196,61,0.45);
    min-width: 1.5ch;
    text-align: right;
    transition: transform 0.15s;
  }
  .score #score.bump { transform: scale(1.35); }

  .coin-flyer {
    position: absolute;
    width: 22px; height: 22px;
    pointer-events: none;
    z-index: 15;
    filter: drop-shadow(0 0 8px rgba(255,196,61,0.8))
            drop-shadow(0 0 16px rgba(255,140,60,0.6));
    transform: translate(0,0);
    will-change: transform, opacity;
  }
  .coin-flyer svg { width: 100%; height: 100%; display: block; }

  .rocket-wrap.destroyed { opacity: 0; transition: opacity 0.12s; }

  .game-over {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 20;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.25s ease;
    background: radial-gradient(ellipse at center, rgba(30,0,0,0.55), rgba(0,0,0,0.0) 70%);
  }
  .game-over.show { opacity: 1; }
  .go-text {
    font: 800 clamp(40px, 7.5vw, 104px)/1.05 "Noto Sans Georgian", "BPG Nino Mtavruli", "Sylfaen", "Helvetica Neue", Helvetica, Arial, sans-serif;
    letter-spacing: 0.03em;
    color: #fff;
    text-align: center;
    max-width: 92vw;
    text-shadow:
      0 0 18px rgba(255, 90, 110, 0.9),
      0 0 42px rgba(255, 90, 110, 0.5),
      0 4px 0 #8b0018;
    transform: translateY(0);
    animation: go-pop 0.5s cubic-bezier(.2,1.4,.5,1) both;
  }
  .go-sub {
    margin-top: 14px;
    color: rgba(233,236,255,0.85);
    font: 600 clamp(16px, 1.6vw, 22px)/1 "Noto Sans Georgian", "BPG Nino Mtavruli", "Sylfaen", sans-serif;
    letter-spacing: 0.08em;
  }
  @keyframes go-pop {
    0%   { transform: scale(0.4); opacity: 0; }
    60%  { transform: scale(1.08); opacity: 1; }
    100% { transform: scale(1.0); opacity: 1; }
  }

  /* ----------------------------------------------------------------
     Keyboard hint overlay
  -----------------------------------------------------------------*/
  .hint {
    position: absolute;
    left: 50%; bottom: 24px;
    transform: translateX(-50%);
    padding: 10px 16px;
    border-radius: 999px;
    background: rgba(10, 8, 30, 0.55);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(180, 180, 255, 0.18);
    color: rgba(233, 236, 255, 0.85);
    font-family: "Noto Sans Georgian", "BPG Nino Mtavruli", "Sylfaen",
                 ui-sans-serif, system-ui, sans-serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.01em;
    user-select: none;
    pointer-events: none;
    transition: opacity 0.6s ease;
    z-index: 5;
  }
  .hint.fade { opacity: 0; }
  .hint-row { display: flex; align-items: center; gap: 6px; }
  .hint-row span { margin: 0 4px; opacity: 0.7; }
  .hint kbd {
    display: inline-block;
    min-width: 22px;
    padding: 3px 6px;
    font: 600 11px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
    text-align: center;
    color: #fff;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.22);
    border-bottom-width: 2px;
    border-radius: 5px;
  }

  /* ----------------------------------------------------------------
     Mobile touch controls — joystick + fire button.
     Hidden on desktop; revealed on coarse (touch) pointers OR narrow screens.
  -----------------------------------------------------------------*/
  .touch {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 8;
    display: none;
  }
  .stick {
    /* Full-screen invisible capture surface — the user swipes anywhere
       to steer. A floating origin (set on pointerdown) means the touch
       point itself becomes the joystick center. */
    position: absolute;
    inset: 0;
    width: auto; height: auto;
    pointer-events: auto;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    background: transparent;
  }
  .stick-ring, .stick-knob { display: none; }
  .stick-ring {
    position: absolute; inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle at 50% 45%,
      rgba(30, 24, 60, 0.55),
      rgba(10, 8, 30, 0.65));
    border: 1.5px solid rgba(180, 180, 255, 0.28);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    box-shadow:
      inset 0 0 30px rgba(122, 75, 255, 0.18),
      0 4px 20px rgba(0, 0, 0, 0.35);
  }
  .stick-ring::after {
    content: "";
    position: absolute;
    left: 50%; top: 50%;
    width: 70%; height: 70%;
    transform: translate(-50%, -50%);
    background:
      linear-gradient(to right, transparent 49%, rgba(255,255,255,0.12) 49% 51%, transparent 51%),
      linear-gradient(to bottom, transparent 49%, rgba(255,255,255,0.12) 49% 51%, transparent 51%);
    border-radius: 50%;
    pointer-events: none;
  }
  .stick-knob {
    position: absolute;
    left: 50%; top: 50%;
    width: 58px; height: 58px;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle at 35% 30%, #e9ecff 0%, #a9ecff 35%, #4fd1ff 75%, #3a86b8 100%);
    border: 2px solid rgba(255, 255, 255, 0.55);
    box-shadow:
      0 6px 14px rgba(0, 0, 0, 0.5),
      0 0 14px rgba(79, 209, 255, 0.55);
    transition: transform 0.12s ease-out;
    will-change: transform;
  }
  .stick.active .stick-knob { transition: none; }

  .fire-btn {
    position: absolute;
    right: 24px;
    bottom: calc(42px + env(safe-area-inset-bottom, 0px));
    width: 88px; height: 88px;
    border-radius: 50%;
    border: 2px solid rgba(255, 180, 100, 0.55);
    background: radial-gradient(circle at 35% 30%,
      #ffd890 0%, #ff8a5c 45%, #d63d4a 90%);
    box-shadow:
      0 0 22px rgba(255, 120, 80, 0.55),
      0 8px 22px rgba(0, 0, 0, 0.45),
      inset 0 -6px 12px rgba(0, 0, 0, 0.2);
    pointer-events: auto;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    padding: 0;
    display: grid;
    place-items: center;
    color: #fff;
    cursor: pointer;
    transition: transform 0.08s ease;
  }
  .fire-btn:active,
  .fire-btn.pressed { transform: scale(0.92); filter: brightness(1.15); }
  .fire-btn svg { width: 42%; height: 42%; filter: drop-shadow(0 2px 3px rgba(0,0,0,0.4)); }

  /* Show touch UI on devices that need it */
  @media (pointer: coarse), (max-width: 820px) {
    .touch { display: block; }
    .hint {
      bottom: calc(110px + env(safe-area-inset-bottom, 0px));
      padding: 8px 12px;
      font-size: 12px;
    }
    .hint kbd { min-width: 18px; padding: 2px 5px; font-size: 10px; }
  }
  @media (pointer: coarse) and (max-width: 520px) {
    .hint { display: none; }
    .score { top: calc(12px + env(safe-area-inset-top, 0px)); right: 14px; padding: 6px 10px; }
    .score-label { font-size: 10px; }
    .score #score { font-size: 16px; }
    .fire-btn { width: 78px; height: 78px; right: 18px; bottom: calc(28px + env(safe-area-inset-bottom, 0px)); }
  }

  /* ----------------------------------------------------------------
     Falling coin pickups + coin flyer
  -----------------------------------------------------------------*/
  .pickups { position: absolute; inset: 0; pointer-events: none; z-index: 3; }
  .pickup {
    position: absolute;
    width: 34px; height: 34px;
    will-change: transform, left, top;
    filter: drop-shadow(0 0 10px rgba(255, 200, 80, 0.7))
            drop-shadow(0 0 22px rgba(255, 140, 40, 0.35));
    animation: coin-spin 1.2s linear infinite, coin-bob 1.6s ease-in-out infinite alternate;
  }
  .pickup svg { width: 100%; height: 100%; display: block; }
  @keyframes coin-spin {
    0%   { transform: rotateY(0deg); }
    100% { transform: rotateY(360deg); }
  }
  @keyframes coin-bob {
    from { filter: drop-shadow(0 0 8px rgba(255,200,80,0.5)); }
    to   { filter: drop-shadow(0 0 16px rgba(255,220,120,0.95))
                   drop-shadow(0 0 30px rgba(255,140,40,0.55)); }
  }

  .coin-flyer {
    position: absolute;
    width: 22px; height: 22px;
    pointer-events: none;
    z-index: 7;
    will-change: transform, opacity;
    filter: drop-shadow(0 0 6px rgba(255, 200, 80, 0.85));
  }
  .coin-flyer svg { width: 100%; height: 100%; display: block; }

  /* Score bump when coins land */
  #score { transition: transform 0.18s cubic-bezier(.2,1.4,.5,1), color 0.2s; }
  #score.bump {
    transform: scale(1.35);
    color: #ffd76a;
    text-shadow: 0 0 10px rgba(255, 215, 106, 0.8);
  }

  /* ----------------------------------------------------------------
     Power-ups — shared bob + blinking halo, per-kind glow color
  -----------------------------------------------------------------*/
  .powerup {
    position: absolute;
    width: 46px; height: 46px;
    transform: translate(-50%, -50%);
    pointer-events: none;
    --pu-glow: 120, 200, 255;
    filter:
      drop-shadow(0 0 10px rgba(var(--pu-glow), 1))
      drop-shadow(0 0 24px rgba(var(--pu-glow), 0.75))
      drop-shadow(0 0 42px rgba(var(--pu-glow), 0.45));
    animation:
      pu-bob 1.4s ease-in-out infinite alternate,
      pu-blink 0.7s ease-in-out infinite alternate;
  }
  .powerup::before {
    content: "";
    position: absolute;
    inset: -18px;
    border-radius: 50%;
    background: radial-gradient(circle,
      rgba(var(--pu-glow), 0.65) 0%,
      rgba(var(--pu-glow), 0.30) 40%,
      rgba(var(--pu-glow), 0.0)  72%);
    z-index: -1;
    animation: pu-halo 0.8s ease-in-out infinite alternate;
    pointer-events: none;
  }
  .powerup.shield { --pu-glow: 120, 200, 255; }
  .powerup.double { --pu-glow: 255, 170,  90; }
  .powerup.bomb   { --pu-glow: 255, 110, 110; }
  .powerup.magnet { --pu-glow: 255,  90, 170; }
  .powerup.heal   { --pu-glow: 130, 240, 150; }
  .powerup.slow   { --pu-glow: 170, 220, 255; }

  .powerup svg { width: 100%; height: 100%; display: block; }
  @keyframes pu-bob {
    from { transform: translate(-50%, -50%) rotate(-4deg); }
    to   { transform: translate(-50%, -40%) rotate(4deg); }
  }
  @keyframes pu-blink {
    0%,100% { opacity: 0.75; }
    50%     { opacity: 1.0; }
  }
  @keyframes pu-halo {
    0%,100% { opacity: 0.45; transform: scale(0.82); }
    50%     { opacity: 1.0;  transform: scale(1.25); }
  }
  .powerups { position: absolute; inset: 0; pointer-events: none; z-index: 4; }

  /* Active shield halo around rocket */
  .shield-halo {
    position: absolute;
    left: 0; top: 0;
    width: 180px; height: 180px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    pointer-events: none;
    z-index: 5;
    background:
      radial-gradient(circle,
        rgba(120,200,255,0.0) 54%,
        rgba(120,200,255,0.18) 62%,
        rgba(120,200,255,0.45) 75%,
        rgba(80,160,255,0.0) 100%);
    box-shadow:
      inset 0 0 30px rgba(180, 220, 255, 0.55),
      0 0 24px rgba(120, 200, 255, 0.55);
    animation: shield-pulse 2.2s ease-in-out infinite;
  }
  @keyframes shield-pulse {
    0%,100% { transform: translate(-50%, -50%) scale(1.0);   opacity: 1; }
    50%     { transform: translate(-50%, -50%) scale(1.08);  opacity: 0.75; }
  }

  /* Shield timer (top-center of rocket) */
  .shield-timer {
    position: absolute;
    left: 0; top: 0;
    width: 64px; height: 64px;
    transform: translate(-50%, calc(-50% - 110px));
    pointer-events: none;
    z-index: 9;
  }
  .shield-timer svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .shield-timer .ring-bg   { fill: none; stroke: rgba(10,10,30,0.55); stroke-width: 5; }
  .shield-timer .ring-fg   { fill: none; stroke: #7be0ff; stroke-width: 5; stroke-linecap: round;
                             filter: drop-shadow(0 0 6px rgba(120,220,255,0.9)); }
  .shield-timer .num {
    position: absolute; inset: 0; display: grid; place-items: center;
    font: 800 16px/1 "Noto Sans Georgian", ui-sans-serif, system-ui, sans-serif;
    color: #eaf6ff;
    text-shadow: 0 0 8px rgba(80,180,255,0.9);
  }

  /* Active double-shot badge near HUD */
  .ds-badge {
    position: absolute;
    right: 22px; top: 64px;
    z-index: 6;
    padding: 6px 10px;
    border-radius: 10px;
    background: rgba(40, 10, 30, 0.55);
    border: 1px solid rgba(255, 160, 90, 0.4);
    color: #ffdba6;
    font: 700 11px/1 "Noto Sans Georgian", ui-sans-serif, system-ui, sans-serif;
    letter-spacing: 0.08em;
    display: none;
    align-items: center;
    gap: 6px;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .ds-badge.on { display: inline-flex; }

  /* Generic powerup badges (magnet, slow) stacked below the level HUD */
  .pu-badge {
    position: absolute;
    z-index: 6;
    padding: 6px 10px;
    border-radius: 10px;
    background: rgba(10, 8, 30, 0.55);
    border: 1px solid rgba(180, 180, 255, 0.22);
    color: #eaf6ff;
    font: 700 11px/1 "Noto Sans Georgian", ui-sans-serif, system-ui, sans-serif;
    letter-spacing: 0.08em;
    display: none;
    align-items: center;
    gap: 6px;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .pu-badge.on { display: inline-flex; }
  .pu-badge.magnet {
    left: 22px; top: 58px;
    border-color: rgba(255, 130, 200, 0.55);
    color: #ffd6ec;
    box-shadow: 0 0 12px rgba(255, 90, 170, 0.35);
  }
  .pu-badge.slow {
    left: 22px; top: 90px;
    border-color: rgba(170, 220, 255, 0.55);
    color: #d6ecff;
    box-shadow: 0 0 12px rgba(120, 180, 240, 0.35);
  }

  /* Combo + coin-streak counters */
  .combo-hud {
    position: absolute;
    left: 22px; top: 122px;
    z-index: 6;
    padding: 6px 10px;
    border-radius: 10px;
    background: rgba(40, 14, 6, 0.6);
    border: 1px solid rgba(255, 170, 60, 0.45);
    color: #ffe0a8;
    font: 800 12px/1 "Noto Sans Georgian", ui-sans-serif, system-ui, sans-serif;
    letter-spacing: 0.08em;
    display: none;
    align-items: center;
    gap: 6px;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .combo-hud.on { display: inline-flex; }
  .combo-hud.active {
    background: rgba(80, 20, 8, 0.72);
    border-color: rgba(255, 180, 70, 0.95);
    color: #fff2c0;
    animation: combo-pulse 0.55s ease-in-out infinite alternate;
  }
  @keyframes combo-pulse {
    from { filter: brightness(1)   drop-shadow(0 0 6px  rgba(255,170,60,0.55)); }
    to   { filter: brightness(1.3) drop-shadow(0 0 16px rgba(255,170,60,0.95)); }
  }
  .streak-hud {
    position: absolute;
    left: 22px; top: 154px;
    z-index: 6;
    padding: 6px 10px;
    border-radius: 10px;
    background: rgba(40, 30, 6, 0.55);
    border: 1px solid rgba(255, 210, 90, 0.45);
    color: #fff0b8;
    font: 800 12px/1 "Noto Sans Georgian", ui-sans-serif, system-ui, sans-serif;
    letter-spacing: 0.08em;
    display: none;
    align-items: center;
    gap: 6px;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .streak-hud.on { display: inline-flex; }
  .streak-hud .streak-coin {
    width: 16px; height: 16px;
    display: inline-flex;
    filter: drop-shadow(0 0 4px rgba(255,196,61,0.6));
  }
  .streak-hud .streak-coin svg { width: 100%; height: 100%; display: block; }

  /* Centered bonus banner (combo/streak rewards) */
  .bonus-banner {
    position: absolute;
    left: 50%; top: 32%;
    transform: translate(-50%, -50%) scale(0.8);
    z-index: 17;
    pointer-events: none;
    opacity: 0;
    font: 800 clamp(24px, 4vw, 48px)/1 "Noto Sans Georgian", ui-sans-serif, system-ui, sans-serif;
    letter-spacing: 0.04em;
    color: #fff4c8;
    text-shadow:
      0 0 16px rgba(255, 180, 60, 0.9),
      0 0 32px rgba(255, 120, 40, 0.7),
      0 3px 0 rgba(40, 10, 0, 0.7);
    white-space: nowrap;
  }
  .bonus-banner.show {
    animation: bonus-pop 1.2s cubic-bezier(.2,1.4,.5,1) forwards;
  }
  @keyframes bonus-pop {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.6); }
    25%  { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
    60%  { opacity: 1; transform: translate(-50%, -60%) scale(1.0); }
    100% { opacity: 0; transform: translate(-50%, -80%) scale(0.95); }
  }

    /* ----------------------------------------------------------------
     Shockwave rings + fullscreen flash + screen shake (player death)
  -----------------------------------------------------------------*/
  .shockwave {
    position: absolute;
    width: 20px; height: 20px;
    margin-left: -10px; margin-top: -10px;
    border-radius: 50%;
    border: 4px solid rgba(255, 200, 140, 0.9);
    box-shadow:
      0 0 30px rgba(255, 160, 80, 0.8),
      inset 0 0 20px rgba(255, 220, 180, 0.5);
    pointer-events: none;
    animation: shockwave-grow 1.1s cubic-bezier(.1,.7,.3,1) forwards;
    mix-blend-mode: screen;
  }
  .shockwave.slow {
    border-color: rgba(180, 220, 255, 0.8);
    box-shadow: 0 0 40px rgba(120,160,255,0.7), inset 0 0 30px rgba(180,210,255,0.45);
    animation-duration: 1.5s;
  }
  @keyframes shockwave-grow {
    0%   { transform: scale(0.3); opacity: 1; border-width: 6px; }
    70%  { opacity: 0.6; border-width: 2px; }
    100% { transform: scale(30); opacity: 0; border-width: 0.5px; }
  }
  .bigflash {
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 50%, rgba(255,240,210,0.9), rgba(255,200,150,0.3) 40%, transparent 70%);
    pointer-events: none;
    animation: bigflash 0.7s ease-out forwards;
    mix-blend-mode: screen;
  }
  @keyframes bigflash {
    0%   { opacity: 0; }
    10%  { opacity: 1; }
    100% { opacity: 0; }
  }
  .stage.shake { animation: shake 0.9s cubic-bezier(.36,.07,.19,.97); }
  @keyframes shake {
    0%,100% { transform: translate(0,0); }
    10%     { transform: translate(-8px, 4px); }
    20%     { transform: translate(9px, -6px); }
    30%     { transform: translate(-12px, -5px); }
    40%     { transform: translate(7px, 8px); }
    50%     { transform: translate(-5px, -7px); }
    60%     { transform: translate(6px, 5px); }
    70%     { transform: translate(-4px, 3px); }
    80%     { transform: translate(3px, -2px); }
    90%     { transform: translate(-1px, 1px); }
  }

  /* ----------------------------------------------------------------
     Life meter (right side, vertical)
  -----------------------------------------------------------------*/
  .life-meter {
    position: absolute;
    right: 22px;
    top: 72px;
    z-index: 6;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 10px 8px;
    border-radius: 12px;
    background: rgba(10,8,30,0.55);
    border: 1px solid rgba(180,180,255,0.18);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    user-select: none;
  }
  .life-label {
    font: 700 10px/1 ui-monospace, Menlo, monospace;
    letter-spacing: 0.12em;
    color: rgba(233,236,255,0.6);
  }
  .life-bar {
    width: 16px; height: 140px;
    position: relative;
    background: rgba(255,255,255,0.08);
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.15);
  }
  .life-fill {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    background: linear-gradient(to top, #22d37a 0%, #7bf0a0 55%, #d8ff8a 100%);
    box-shadow: 0 0 12px rgba(120, 240, 160, 0.6), inset 0 0 8px rgba(255,255,255,0.25);
    transition: height 0.25s ease-out, background 0.3s, box-shadow 0.3s;
    height: 100%;
  }
  .life-fill.med {
    background: linear-gradient(to top, #d89a1a 0%, #ffd34b 60%, #fff2a0 100%);
    box-shadow: 0 0 12px rgba(255,200,80,0.6), inset 0 0 8px rgba(255,255,255,0.25);
  }
  .life-fill.low {
    background: linear-gradient(to top, #d63d4a 0%, #ff7a6a 70%, #ffd0c0 100%);
    box-shadow: 0 0 14px rgba(255,90,90,0.8), inset 0 0 8px rgba(255,255,255,0.25);
    animation: life-pulse 0.7s ease-in-out infinite alternate;
  }
  @keyframes life-pulse {
    from { filter: brightness(0.8); }
    to   { filter: brightness(1.35); }
  }
  .life-ticks {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(to bottom,
        transparent calc(100% / 5 - 1px), rgba(0,0,0,0.4) calc(100% / 5),
        transparent calc(100% / 5 + 1px), transparent calc(200% / 5 - 1px),
        rgba(0,0,0,0.4) calc(200% / 5), transparent calc(200% / 5 + 1px),
        transparent calc(300% / 5 - 1px), rgba(0,0,0,0.4) calc(300% / 5),
        transparent calc(300% / 5 + 1px), transparent calc(400% / 5 - 1px),
        rgba(0,0,0,0.4) calc(400% / 5), transparent calc(400% / 5 + 1px));
    pointer-events: none;
  }
  .life-icon { font-size: 14px; line-height: 1; }
  @media (pointer: coarse) and (max-width: 520px) {
    .life-meter { right: 14px; top: 60px; padding: 8px 6px; }
    .life-bar   { width: 12px; height: 110px; }
  }

  /* ----------------------------------------------------------------
     Rocket hit-flash overlay
  -----------------------------------------------------------------*/
  .rocket-wrap.hit-flash { filter: drop-shadow(0 0 18px #ff5a6e) brightness(1.8); }

  /* ----------------------------------------------------------------
     Enemy red bolts (from gun UFOs)
  -----------------------------------------------------------------*/
  .enemy-bolt {
    position: absolute;
    width: 5px;
    height: 18px;
    border-radius: 2px;
    background: linear-gradient(
      to bottom,
      rgba(255,255,255,0) 0%,
      #ffdccc 15%,
      #ff5a6e 50%,
      #8b0018 100%
    );
    box-shadow:
      0 0 6px #ff5a6e,
      0 0 14px #ff5a6e,
      0 0 22px rgba(200, 40, 60, 0.8);
    transform: translate(-50%, -50%);
    will-change: transform, opacity;
    pointer-events: none;
  }
  .enemy-bolt::after {
    content: "";
    position: absolute;
    left: 50%; top: -2px;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,220,200,0.9), rgba(255,90,110,0.5) 40%, transparent 70%);
    transform: translate(-50%, -50%);
  }
  .enemy-bolts { position: absolute; inset: 0; pointer-events: none; z-index: 4; }

  /* Gun-UFO variant gets a red tinted drop shadow */
  .ufo.gun { filter: drop-shadow(0 6px 14px rgba(0,0,0,0.55))
                    drop-shadow(0 0 16px rgba(255, 90, 110, 0.55)); }

  /* Sine-wave UFO variant gets a purple tinted drop shadow */
  .ufo.sine { filter: drop-shadow(0 6px 14px rgba(0,0,0,0.55))
                     drop-shadow(0 0 16px rgba(180, 120, 255, 0.55)); }

  /* ----------------------------------------------------------------
     Level HUD + round-change banner
  -----------------------------------------------------------------*/
  .level-hud {
    position: absolute;
    top: 18px; left: 22px;
    z-index: 6;
    padding: 8px 14px;
    border-radius: 10px;
    background: rgba(10,8,30,0.55);
    border: 1px solid rgba(180,180,255,0.18);
    color: #e9ecff;
    font-family: "Noto Sans Georgian", "Sylfaen", ui-sans-serif, system-ui, sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.04em;
    user-select: none;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: flex; align-items: baseline; gap: 10px;
  }
  .level-hud .level-label { opacity: 0.55; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; }
  .level-hud #level {
    font-size: 18px;
    font-weight: 800;
    color: #a9ecff;
    text-shadow: 0 0 10px rgba(79,209,255,0.45);
  }
  @media (pointer: coarse) and (max-width: 520px) {
    .level-hud { top: calc(12px + env(safe-area-inset-top, 0px)); left: 14px; padding: 6px 10px; }
    .level-hud #level { font-size: 14px; }
    .level-hud .level-label { font-size: 10px; }
  }

  .round-banner {
    position: absolute;
    left: 50%; top: 42%;
    transform: translate(-50%, -50%) scale(0.6);
    z-index: 18;
    pointer-events: none;
    opacity: 0;
    font-family: "Noto Sans Georgian", "Sylfaen", ui-sans-serif, system-ui, sans-serif;
    font-weight: 800;
    font-size: clamp(36px, 7vw, 92px);
    letter-spacing: 0.04em;
    color: #fff;
    text-shadow:
      0 0 24px rgba(79, 209, 255, 0.85),
      0 0 48px rgba(122, 75, 255, 0.7),
      0 4px 0 rgba(10,8,30,0.7);
    white-space: nowrap;
  }
  .round-banner.show {
    animation: round-pop 1.6s cubic-bezier(.2,1.4,.5,1) forwards;
  }
  @keyframes round-pop {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
    20%  { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
    40%  { opacity: 1; transform: translate(-50%, -50%) scale(1.0); }
    80%  { opacity: 1; transform: translate(-50%, -50%) scale(1.0); }
    100% { opacity: 0; transform: translate(-50%, -70%) scale(0.95); }
  }

  /* ----------------------------------------------------------------
     Kill quotes (Georgian) — floating text above the kill site
  -----------------------------------------------------------------*/
  .quotes { position: absolute; inset: 0; pointer-events: none; z-index: 6; }
  .quote {
    position: absolute;
    transform: translate(-50%, -50%);
    padding: 8px 14px;
    border-radius: 14px;
    background: rgba(10, 8, 30, 0.55);
    border: 1px solid rgba(180, 180, 255, 0.25);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    color: #fff;
    font-family: "BPG Nino Mtavruli", "Noto Sans Georgian", "Sylfaen",
                 ui-sans-serif, system-ui, sans-serif;
    font-weight: 700;
    font-size: clamp(16px, 1.6vw, 22px);
    letter-spacing: 0.01em;
    white-space: nowrap;
    text-shadow: 0 2px 8px rgba(0,0,0,0.7);
    will-change: transform, opacity;
    box-shadow: 0 6px 24px rgba(0,0,0,0.45),
                0 0 18px rgba(122, 75, 255, 0.25);
  }
  .quote::after {
    /* little speech-bubble tail */
    content: "";
    position: absolute;
    left: 22px; bottom: -7px;
    width: 12px; height: 12px;
    background: inherit;
    border-right: 1px solid rgba(180, 180, 255, 0.25);
    border-bottom: 1px solid rgba(180, 180, 255, 0.25);
    transform: rotate(45deg);
    border-bottom-right-radius: 3px;
  }

  /* ----------------------------------------------------------------
     Accessibility: respect reduced-motion
  -----------------------------------------------------------------*/
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
    }
  }

  /* ----------------------------------------------------------------
     Smaller screens: shrink rocket and slow planets slightly.
  -----------------------------------------------------------------*/
  @media (max-width: 640px) {
    :root { --star-near: 5s; --star-mid: 10s; --star-far: 20s; }
    .rocket-wrap { width: 18vw; }
    .planet.one  { width: 160px; height: 160px; }
    .planet.two  { width: 110px; height: 110px; }
    .planet.three{ width:  80px; height:  80px; }
  }
</style>
</head>

<body tabindex="0">
  <div class="stage" aria-label="Animated rocket flying through a galaxy">

    <!-- Nebula blobs (very back) -->
    <div class="nebula a"></div>
    <div class="nebula b"></div>
    <div class="nebula c"></div>

    <!-- Parallax starfield (3 canvas layers) -->
    <canvas class="stars far"  id="starsFar"></canvas>
    <canvas class="stars mid"  id="starsMid"></canvas>
    <canvas class="stars near" id="starsNear"></canvas>
    <div class="twinkle"></div>

    <!-- Planets & asteroids -->
    <svg class="planet one" viewBox="0 0 100 100" aria-hidden="true">
      <defs>
        <radialGradient id="pA" cx="35%" cy="35%" r="75%">
          <stop offset="0%"  stop-color="var(--planet-a1)"/>
          <stop offset="100%" stop-color="var(--planet-a2)"/>

<script>
/* ------------------------------------------------------------------
   Starfield generator — draws a 2×-tall field of stars into each
   canvas so the CSS translateY(50%) loop is seamless.
   Three layers with different density, size, and brightness give
   us depth without any JS animation loop.
-------------------------------------------------------------------*/
(function () {
  const layers = [
    { el: document.getElementById('starsFar'),  count: 160, sizeMin: 0.4, sizeMax: 1.1, alphaMin: 0.25, alphaMax: 0.7,  tint: false },
    { el: document.getElementById('starsMid'),  count: 110, sizeMin: 0.8, sizeMax: 1.8, alphaMin: 0.45, alphaMax: 0.9,  tint: true  },
    { el: document.getElementById('starsNear'), count:  60, sizeMin: 1.4, sizeMax: 2.8, alphaMin: 0.75, alphaMax: 1.0,  tint: true  },
  ];

  // Subtle blue/violet/white tint pool (no saturated colors)
  const TINTS = [
    [233, 236, 255], // white
    [210, 220, 255], // cool white
    [200, 190, 255], // faint violet
    [255, 235, 220], // faint warm
  ];

  function drawLayer(layer) {
    const { el } = layer;
    // Canvas is 2× viewport height so the 50% translate wraps cleanly.
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const w = window.innerWidth;
    const h = window.innerHeight * 2;
    el.width  = w * dpr;
    el.height = h * dpr;
    el.style.width  = w + 'px';
    el.style.height = h + 'px';
    const ctx = el.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, w, h);

    for (let i = 0; i < layer.count; i++) {
      const x = Math.random() * w;
      const y = Math.random() * h;
      const r = layer.sizeMin + Math.random() * (layer.sizeMax - layer.sizeMin);
      const a = layer.alphaMin + Math.random() * (layer.alphaMax - layer.alphaMin);
      const [cr, cg, cb] = layer.tint
        ? TINTS[Math.floor(Math.random() * TINTS.length)]
        : TINTS[0];

      // Soft star — tight radial glow
      const g = ctx.createRadialGradient(x, y, 0, x, y, r * 3);
      g.addColorStop(0,   `rgba(${cr},${cg},${cb},${a})`);
      g.addColorStop(0.4, `rgba(${cr},${cg},${cb},${a * 0.35})`);
      g.addColorStop(1,   `rgba(${cr},${cg},${cb},0)`);
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(x, y, r * 3, 0, Math.PI * 2);
      ctx.fill();

      // Hard core
      ctx.fillStyle = `rgba(${cr},${cg},${cb},${Math.min(1, a + 0.2)})`;
      ctx.beginPath();
      ctx.arc(x, y, r * 0.6, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function draw() { layers.forEach(drawLayer); }

  // Debounced resize so we don't regenerate on every pixel
  let rid;
  window.addEventListener('resize', () => {
    clearTimeout(rid);
    rid = setTimeout(draw, 120);
  });
  draw();
})();

/* ------------------------------------------------------------------
   Ember particles — spawn periodically behind the rocket so the
   exhaust has follow-through / trailing hot bits.
-------------------------------------------------------------------*/
(function () {
  const host = document.getElementById('embers');
  if (!host) return;
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  const MAX = 24;
  function spawn() {
    if (host.childElementCount >= MAX) return;
    const e = document.createElement('span');
    e.className = 'ember';
    const drift = (Math.random() - 0.5) * 60;        // horizontal sway
    const dur   = 1.2 + Math.random() * 1.1;         // life (s)
    const size  = 2 + Math.random() * 2.5;
    const warm  = Math.random() < 0.5;
    e.style.setProperty('--drift', drift + 'px');
    e.style.animationDuration = dur + 's';
    e.style.width  = size + 'px';
    e.style.height = size + 'px';
    if (!warm) {
      e.style.background = 'var(--flame-cold)';
      e.style.boxShadow  = '0 0 6px var(--flame-cold), 0 0 14px #4a2bff';
    }
    host.appendChild(e);
    setTimeout(() => e.remove(), dur * 1000 + 50);
  }
  setInterval(spawn, 90);
})();

/* ------------------------------------------------------------------
   Keyboard flight controls
   Arrow keys or WASD move the rocket around the viewport with
   gentle acceleration + damping so it glides. Left/right also banks
   the rocket into the turn for a nicer feel.
   The pilot layer holds translate + rotate; .wobble / .vibe below
   it keep their idle jitter so the rocket still feels alive when idle.
-------------------------------------------------------------------*/
(function () {
  const pilot = document.getElementById('pilot');
  const hint  = document.getElementById('hint');
  if (!pilot) return;

  // State (in px, relative to the centered rocket rest position)
  let x = 0, y = 0;       // position offset
  let vx = 0, vy = 0;     // velocity
  let bank = 0;           // current bank angle (deg)

  // Expose live state + reset so other systems (lasers, UFOs, game) can read it.
  // Setters allow 1:1 drag controllers to write position/velocity directly.
  window.ROCKET = {
    get x()    { return x; },
    set x(v)   { x = v; },
    get y()    { return y; },
    set y(v)   { y = v; },
    get vx()   { return vx; },
    set vx(v)  { vx = v; },
    get vy()   { return vy; },
    set vy(v)  { vy = v; },
    get bank() { return bank; },
    get alive(){ return !window.GAME || !window.GAME.over; },
    // Direct input hook for touch controls — set any of
    // ROCKET.keys.up / down / left / right to true/false.
    keys: null, // set below after keys is defined
    // Tap-to-move: set {x, y} in rocket-offset space (0,0 = rest position)
    // and the flight loop will fly there. Set to null to release.
    target: null,
    reset() {
      x = 0; y = 0; vx = 0; vy = 0; bank = 0;
      for (const k in keys) keys[k] = false;
      window.ROCKET.target = null;
    },
  };

  // Tuning — touch devices fly faster toward tap targets, but with gentler
  // acceleration so the trip still feels deliberate.
  const IS_TOUCH = matchMedia('(pointer: coarse)').matches;
  const ACCEL    = IS_TOUCH ? 0.9  : 0.9;   // px / frame^2
  const MAX_V    = IS_TOUCH ? 14   : 14;    // max velocity (px / frame)
  const DAMP     = 0.88;
  const MAX_BANK = 18;    // deg
  const BANK_LERP= 0.12;  // how quickly bank catches up to target

  // Bounds — keep rocket within a safe margin of the viewport
  function bounds() {
    const margin = 60;
    return {
      minX: -window.innerWidth  / 2 + margin,
      maxX:  window.innerWidth  / 2 - margin,
      minY: -window.innerHeight / 2 + margin,
      maxY:  window.innerHeight / 2 - margin,
    };
  }

  // Input
  const keys = Object.create(null);
  window.ROCKET.keys = keys;
  const KEYMAP = {
    ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right',
    w: 'up', W: 'up', s: 'down', S: 'down', a: 'left', A: 'left', d: 'right', D: 'right',
  };

  let hintTimer = null;
  function fadeHint() {
    if (!hint) return;
    clearTimeout(hintTimer);
    hintTimer = setTimeout(() => hint.classList.add('fade'), 2000);
  }
  fadeHint();

  window.addEventListener('keydown', (e) => {
    const dir = KEYMAP[e.key];
    if (!dir) return;
    keys[dir] = true;
    if (hint) hint.classList.add('fade');
    // Stop the page from scrolling on arrow keys.
    if (e.key.startsWith('Arrow') || e.key === ' ') e.preventDefault();
  }, { passive: false });

  window.addEventListener('keyup', (e) => {
    const dir = KEYMAP[e.key];
    if (dir) keys[dir] = false;
  });

  // Release keys when the tab loses focus so the rocket doesn't
  // keep accelerating into the void.
  window.addEventListener('blur', () => {
    for (const k in keys) keys[k] = false;
  });

  function tick() {
    // Apply thrust
    let ax = 0, ay = 0;

    // Target-seek mode: if window.ROCKET.target is set (x,y in rocket-offset
    // space, i.e. same coords as `x`/`y`), accelerate toward it. This is
    // used by the mobile touch-to-move controller — tap a point and the
    // rocket flies there fast. Falls back to key thrust when no target.
    const T = window.ROCKET && window.ROCKET.target;
    if (T) {
      const dx = T.x - x, dy = T.y - y;
      const d  = Math.hypot(dx, dy);
      if (d > 2) {
        const nx = dx / d, ny = dy / d;
        ax += nx * ACCEL * 1.6;  // a little punchier for tap-to-move
        ay += ny * ACCEL * 1.6;
      } else {
        // Arrived — clear the target so damping brings us to rest.
        window.ROCKET.target = null;
      }
    } else {
      if (keys.left)  ax -= ACCEL;
      if (keys.right) ax += ACCEL;
      if (keys.up)    ay -= ACCEL;
      if (keys.down)  ay += ACCEL;
    }

    vx += ax; vy += ay;

    // Damp when no input on that axis
    if (!T) {
      if (!keys.left && !keys.right) vx *= DAMP;
      if (!keys.up   && !keys.down)  vy *= DAMP;
    } else {
      // Light global damping while seeking, so we don't overshoot wildly.
      vx *= 0.96; vy *= 0.96;
    }

    // Clamp velocity
    const v2 = vx * vx + vy * vy;
    if (v2 > MAX_V * MAX_V) {
      const s = MAX_V / Math.sqrt(v2);
      vx *= s; vy *= s;
    }

    // Integrate position
    x += vx; y += vy;

    // Constrain to viewport
    const b = bounds();
    if (x < b.minX) { x = b.minX; vx = 0; }
    if (x > b.maxX) { x = b.maxX; vx = 0; }
    if (y < b.minY) { y = b.minY; vy = 0; }
    if (y > b.maxY) { y = b.maxY; vy = 0; }

    // Bank into the turn — target angle proportional to vx
    const targetBank = Math.max(-MAX_BANK, Math.min(MAX_BANK, (vx / MAX_V) * MAX_BANK));
    bank += (targetBank - bank) * BANK_LERP;

    pilot.style.transform =
      `translate(${x.toFixed(2)}px, ${y.toFixed(2)}px) rotate(${bank.toFixed(2)}deg)`;

    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
})();

/* ------------------------------------------------------------------
   Combat: lasers + UFOs + game-over
-------------------------------------------------------------------*/
(function () {
  const laserHost = document.getElementById('lasers');
  const ufoHost   = document.getElementById('ufos');
  const fxHost    = document.getElementById('fx');
  const rocketWrap= document.getElementById('rocketWrap');
  const pilot     = document.getElementById('pilot');
  const overlay   = document.getElementById('gameOver');
  if (!laserHost || !ufoHost || !fxHost || !rocketWrap || !pilot) return;

      s.start(t); s.stop(t + 0.22);

  // ---- Rocket viewport position (center of screen + ROCKET offset) ----
  function rocketCenter() {
    const R = window.ROCKET || { x: 0, y: 0, bank: 0 };
    return {
      x: window.innerWidth  / 2 + R.x,
      y: window.innerHeight / 2 + R.y,
      bank: R.bank,
    };
  }
  function rocketSize() {
    // rocket-wrap width rule: min(110px, 9vw). aspect 1:2.2.
    const w = Math.min(110, window.innerWidth * 0.09);

    if (GAME.over) return;

    const c = rocketCenter();
    const s = rocketSize();
    // Nose tip is at top of rocket, rotated by bank around the center.
    const rad = (c.bank) * Math.PI / 180;
    const up  = s.h * 0.44; // distance from center to nose tip
    const nx  = c.x + Math.sin(rad) * up;
    const ny  = c.y - Math.cos(rad) * up;
    const vx  = Math.sin(rad) * BOLT_SPEED;
    const vy  = -Math.cos(rad) * BOLT_SPEED;

    const el = document.createElement('div');
    el.className = 'laser';
    el.style.left = nx + 'px';
    el.style.top  = ny + 'px';
    el.style.transform = `translate(-50%, -50%) rotate(${c.bank}deg)`;

  // ---- Enemy bolts (red, from gun UFOs) ----
  const ENEMY_BOLT_SPEED_BASE = 7;
  function spawnEnemyBolt(sx, sy) {
    if (!enemyBoltsHost) return;
    // Aim roughly at the rocket's current position, with small spread
    const c = rocketCenter();
    const dx = c.x - sx, dy = c.y - sy;
    const d  = Math.hypot(dx, dy) || 1;
    const spread = (Math.random() - 0.5) * 0.18; // radians
    const ang = Math.atan2(dy, dx) + spread;
    const mult = (window.LEVEL_SPEED && window.LEVEL_SPEED[GAME.level - 1]) || 1;
    const spd = ENEMY_BOLT_SPEED_BASE * Math.max(1, mult);
    const vx = Math.cos(ang) * spd;
    const vy = Math.sin(ang) * spd;
    const el = document.createElement('div');
    el.className = 'enemy-bolt';
    el.style.left = sx + 'px';
    el.style.top  = sy + 'px';
    const rotDeg = (Math.atan2(vy, vx) * 180 / Math.PI) + 90;
    el.style.transform = `translate(-50%, -50%) rotate(${rotDeg}deg)`;
    enemyBoltsHost.appendChild(el);
    enemyBolts.push({ el, x: sx, y: sy, vx, vy });
    try { SFX.enemyShot(); } catch (_) {}
  }
  function hitRocketVsEnemyBolt(b) {
    const c = rocketCenter();
    const s = rocketSize();
    const dx = c.x - b.x, dy = c.y - b.y;
    const rr = s.h * 0.28 + 6;
    return dx*dx + dy*dy < rr*rr;
  }

  // ---- Effects: explosion burst ----
  function burst(x, y, opts = {}) {
    const count = opts.count || 18;
    const hue = opts.hue || 'warm'; // warm | cool
    for (let i = 0; i < count; i++) {
      const p = document.createElement('span');
      p.className = 'particle ' + hue;
      const ang = Math.random() * Math.PI * 2;
      const spd = 2 + Math.random() * 6;
      const life = 600 + Math.random() * 500;
      p.style.left = x + 'px';
      p.style.top  = y + 'px';
      fxHost.appendChild(p);
      const start = performance.now();
      const vx = Math.cos(ang) * spd;
      const vy = Math.sin(ang) * spd;
      function step(now) {
        const t = (now - start) / life;
        if (t >= 1) { p.remove(); return; }
        const px = x + vx * (t * 60);
        const py = y + vy * (t * 60) + 40 * t * t; // slight gravity
        p.style.transform = `translate(${px - x}px, ${py - y}px) scale(${1 - t})`;
        p.style.opacity = String(1 - t);
        requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    }
  }

  // ---- Coin flyer: animate a gold coin from kill site to the score HUD ----
  function flyCoin(sx, sy) {
    if (!scoreEl) return;
    const rect = document.querySelector('.score .coin').getBoundingClientRect();
    const tx = rect.left + rect.width / 2;
    const ty = rect.top  + rect.height / 2;

    const coin = document.createElement('div');
    coin.className = 'coin-flyer';
    coin.innerHTML = `
      <svg viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10" fill="url(#coinG)" stroke="#7a4a00" stroke-width="1"/>
        <circle cx="12" cy="12" r="7" fill="none" stroke="#a76a00" stroke-width="0.8" opacity="0.7"/>
        <text x="12" y="15.8" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="9.5" font-weight="800" fill="#7a4a00">¤</text>
      </svg>`;
    coin.style.left = sx + 'px';
    coin.style.top  = sy + 'px';
    fxHost.appendChild(coin);

    const DUR = 650;
    const start = performance.now();
    // Arc via a control point above the midpoint
    const mx = (sx + tx) / 2;
    const my = Math.min(sy, ty) - 80 - Math.random() * 40;

    function step(now) {
      const t = Math.min(1, (now - start) / DUR);
      // Quadratic bezier
      const it = 1 - t;
      const px = it*it*sx + 2*it*t*mx + t*t*tx;
      const py = it*it*sy + 2*it*t*my + t*t*ty;
      coin.style.transform = `translate(${px - sx}px, ${py - sy}px) rotate(${t * 540}deg) scale(${1 - t * 0.3})`;
      coin.style.opacity = String(t > 0.9 ? (1 - t) * 10 : 1);
      if (t < 1) requestAnimationFrame(step);
      else {
        coin.remove();
        // Pulse the score on arrival
        scoreEl.classList.remove('bump');
        void scoreEl.offsetWidth;
        scoreEl.classList.add('bump');
        setTimeout(() => scoreEl.classList.remove('bump'), 180);
      }
    }
    requestAnimationFrame(step);
  }

  // ---- Collisions (AABB-ish using circles) ----
  function hitUFOvsBolt(u, b) {
    const cx = u.x + u.w / 2, cy = u.y + u.h / 2;
    const dx = cx - b.x, dy = cy - b.y;
    const r = (u.w * 0.45);
    return dx*dx + dy*dy < r*r;
  }
  function hitRocketVsUFO(u) {
    const c = rocketCenter();
    const s = rocketSize();
    const ucx = u.x + u.w / 2, ucy = u.y + u.h / 2;
    const dx = c.x - ucx, dy = c.y - ucy;
    // Rocket hitbox: a circle around its center, ~40% of height.
    const rr = s.h * 0.32 + u.w * 0.35;
    return dx*dx + dy*dy < rr*rr;
  }

  // ---- Game-over ----
  function megaBurst(cx, cy) {
    // Shockwave ring
    const ring = document.createElement('div');
    ring.className = 'shockwave';
    ring.style.left = cx + 'px';
    ring.style.top  = cy + 'px';
    fxHost.appendChild(ring);
    setTimeout(() => ring.remove(), 1200);
    // Second slower ring
    const ring2 = document.createElement('div');
    ring2.className = 'shockwave slow';
    ring2.style.left = cx + 'px';
    ring2.style.top  = cy + 'px';
    fxHost.appendChild(ring2);
    setTimeout(() => ring2.remove(), 1600);
    // White flash fullscreen
    const flash = document.createElement('div');
    flash.className = 'bigflash';
    fxHost.appendChild(flash);
    setTimeout(() => flash.remove(), 700);
    // Particle storms
    burst(cx, cy, { count: 140, hue: 'warm' });
    burst(cx, cy, { count: 80,  hue: 'cool' });
    // Staggered secondary bursts
    setTimeout(() => { burst(cx + 60,  cy - 30, { count: 40, hue: 'warm' }); }, 120);
    setTimeout(() => { burst(cx - 50,  cy + 20, { count: 40, hue: 'warm' }); }, 220);
    setTimeout(() => { burst(cx + 10,  cy - 70, { count: 50, hue: 'cool' }); }, 340);
    // Screen shake
    const stage = document.querySelector('.stage');
    if (stage) {
      stage.classList.add('shake');
      setTimeout(() => stage.classList.remove('shake'), 900);
    }
